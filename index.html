<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⛵ McCoy Cove 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0b1628; font-family: Georgia, serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a4060; border-radius: 2px; }
  input::placeholder { color: #3a5a7a; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useRef, useEffect, useCallback } = React;

// ─────────────────────────────────────────────────────────────────
//  CONFIGURATION — fill these in after JSONBin setup (see below)
// ─────────────────────────────────────────────────────────────────
const API_URL = "/api/votes";
// ─────────────────────────────────────────────────────────────────

const GAMES = [
  { id: "apr5",  date: "Sun, Apr 5",  month: "April",     opponent: "NY Mets",           time: "1:05 PM",  note: "Golden State Valkyries Day" },
  { id: "apr25", date: "Sat, Apr 25", month: "April",     opponent: "Miami Marlins",      time: "1:05 PM",  note: "Brandon Belt Day · Aloha Shirt" },
  { id: "apr26", date: "Sun, Apr 26", month: "April",     opponent: "Miami Marlins",      time: "1:05 PM",  note: null },
  { id: "may10", date: "Sun, May 10", month: "May",       opponent: "Pittsburgh Pirates", time: "1:05 PM",  note: null },
  { id: "may23", date: "Sat, May 23", month: "May",       opponent: "Chicago White Sox",  time: "1:05 PM",  note: "Chain Hat Giveaway" },
  { id: "may24", date: "Sun, May 24", month: "May",       opponent: "Chicago White Sox",  time: "1:05 PM",  note: "⭐ Star Wars Day · Grogu Bobblehead" },
  { id: "jun14", date: "Sun, Jun 14", month: "June",      opponent: "Chicago Cubs",       time: "12:10 PM", note: null },
  { id: "jun28", date: "Sun, Jun 28", month: "June",      opponent: "Atlanta Braves",     time: "1:05 PM",  note: null },
  { id: "jul11", date: "Sat, Jul 11", month: "July",      opponent: "Colorado Rockies",   time: "1:05 PM",  note: null },
  { id: "jul12", date: "Sun, Jul 12", month: "July",      opponent: "Colorado Rockies",   time: "1:05 PM",  note: null },
  { id: "jul25", date: "Sat, Jul 25", month: "July",      opponent: "LA Angels",          time: "1:05 PM",  note: null },
  { id: "jul26", date: "Sun, Jul 26", month: "July",      opponent: "LA Angels",          time: "1:05 PM",  note: null },
  { id: "aug9",  date: "Sun, Aug 9",  month: "August",    opponent: "Detroit Tigers",     time: "1:05 PM",  note: null },
  { id: "aug15", date: "Sat, Aug 15", month: "August",    opponent: "Colorado Rockies",   time: "1:05 PM",  note: null },
  { id: "aug16", date: "Sun, Aug 16", month: "August",    opponent: "Colorado Rockies",   time: "1:05 PM",  note: null },
  { id: "aug30", date: "Sun, Aug 30", month: "August",    opponent: "Arizona D-backs",    time: "1:05 PM",  note: null },
  { id: "sep12", date: "Sat, Sep 12", month: "September", opponent: "San Diego Padres",   time: "1:05 PM",  note: null },
  { id: "sep26", date: "Sat, Sep 26", month: "September", opponent: "LA Dodgers",         time: "1:05 PM",  note: null },
  { id: "sep27", date: "Sun, Sep 27", month: "September", opponent: "LA Dodgers",         time: "12:05 PM", note: "Season Finale" },
];

const MONTH_COLORS = {
  April: "#4a9e6b", May: "#3d7ebf", June: "#9b5fb5",
  July: "#e07b39", August: "#c94040", September: "#7a6a2e",
};

const configured = true;

// ── JSONBin API ────────────────────────────────────────────────
async function fetchVotes() {
  const res = await fetch(API_URL);
  if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
  const data = await res.json();
  return Array.isArray(data.votes) ? data.votes : [];
}

async function pushVotes(votes) {
  const res = await fetch(API_URL, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ votes }),
  });
  if (!res.ok) throw new Error(`Save failed: ${res.status}`);
}

// ── Borda scoring ──────────────────────────────────────────────
function computeScores(votes) {
  const scores = {}, counts = {};
  GAMES.forEach(g => { scores[g.id] = 0; counts[g.id] = 0; });
  votes.forEach(v => v.ranking.forEach((id, i) => {
    if (id in scores) { scores[id] += v.ranking.length - i; counts[id]++; }
  }));
  return { scores, counts };
}

// ── Components ─────────────────────────────────────────────────
function MonthTag({ month }) {
  const c = MONTH_COLORS[month];
  return (
    <span style={{
      background: c + "22", color: c, border: `1px solid ${c}55`,
      fontSize: 10, fontWeight: 700, padding: "1px 7px", borderRadius: 20,
      letterSpacing: ".5px", textTransform: "uppercase", flexShrink: 0,
    }}>{month}</span>
  );
}

function GamePill({ game, rank, onClick, draggable, onDragStart, onDragOver, onDrop, onDragEnd }) {
  return (
    <div draggable={draggable}
      onDragStart={onDragStart} onDragOver={onDragOver}
      onDrop={onDrop} onDragEnd={onDragEnd} onClick={onClick}
      style={{
        display: "flex", alignItems: "center", gap: 10,
        padding: "9px 12px", borderRadius: 10,
        cursor: onClick ? "pointer" : "default",
        background: "white", border: "1.5px solid #e8e2d8",
        boxShadow: "0 1px 4px rgba(0,0,0,0.06)", userSelect: "none",
      }}
    >
      {rank != null && (
        <span style={{
          minWidth: 24, height: 24, borderRadius: "50%", background: "#0f1f3d", color: "#fd5a1e",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 12, fontWeight: 800, flexShrink: 0,
        }}>{rank}</span>
      )}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
          <MonthTag month={game.month} />
          <span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>{game.date}</span>
          <span style={{ fontSize: 11, color: "#aaa" }}>{game.time}</span>
        </div>
        <div style={{ fontWeight: 700, fontSize: 14, color: "#0f1f3d", marginTop: 2 }}>vs. {game.opponent}</div>
        {game.note && <div style={{ fontSize: 11, color: "#999", marginTop: 1 }}>{game.note}</div>}
      </div>
      {onClick && rank == null && <span style={{ fontSize: 18, color: "#ccc", flexShrink: 0 }}>＋</span>}
      {rank != null && draggable && <span style={{ fontSize: 14, color: "#bbb", flexShrink: 0, cursor: "grab" }}>⠿</span>}
    </div>
  );
}

function Spinner() {
  return (
    <span style={{
      display: "inline-block", width: 14, height: 14, borderRadius: "50%",
      border: "2px solid rgba(255,255,255,0.2)", borderTopColor: "white",
      animation: "spin 0.7s linear infinite", verticalAlign: "middle", marginRight: 6,
    }} />
  );
}

// ── App ────────────────────────────────────────────────────────
function App() {
  const [view,       setView]       = useState("vote");
  const [step,       setStep]       = useState("name");
  const [voterName,  setVoterName]  = useState("");
  const [ranking,    setRanking]    = useState([]);
  const [votes,      setVotes]      = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [saving,     setSaving]     = useState(false);
  const [error,      setError]      = useState(null);
  const [doneSnap,   setDoneSnap]   = useState(null);

  const dragItem = useRef(null);
  const dragOver = useRef(null);

  const loadFromServer = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const v = await fetchVotes();
      setVotes(v);
    } catch (e) {
      setError("Couldn't load votes. Check your API key and bin ID.");
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    if (configured) loadFromServer();
    else setLoading(false);
  }, []);

  const rankedIds = new Set(ranking);
  const available = GAMES.filter(g => !rankedIds.has(g.id));

  const addGame    = id => setRanking(r => [...r, id]);
  const removeGame = id => setRanking(r => r.filter(x => x !== id));

  const handleDragStart = i => e => { dragItem.current = i; e.dataTransfer.effectAllowed = "move"; };
  const handleDragOver  = i => e => { e.preventDefault(); dragOver.current = i; };
  const handleDrop      = i => e => {
    e.preventDefault();
    if (dragItem.current == null || dragItem.current === i) return;
    setRanking(r => {
      const n = [...r], [m] = n.splice(dragItem.current, 1);
      n.splice(dragOver.current, 0, m);
      return n;
    });
    dragItem.current = dragOver.current = null;
  };

  const handleSubmit = async () => {
    if (!ranking.length || saving) return;
    setSaving(true);
    setError(null);
    try {
      // Re-fetch latest to avoid stomping concurrent votes
      const fresh   = configured ? await fetchVotes() : [...votes];
      const vote    = { name: voterName.trim(), ranking, timestamp: Date.now() };
      const idx     = fresh.findIndex(v => v.name.toLowerCase() === vote.name.toLowerCase());
      const updated = idx >= 0 ? fresh.map((v, i) => i === idx ? vote : v) : [...fresh, vote];
      await pushVotes(updated);
      setVotes(updated);
      setDoneSnap({ topGame: GAMES.find(g => g.id === ranking[0]) ?? null, totalVoters: updated.length });
      setStep("done");
    } catch (e) {
      setError("Couldn't save your vote. Please try again.");
    } finally {
      setSaving(false);
    }
  };

  const { scores, counts } = computeScores(votes);
  const sorted   = [...GAMES].sort((a, b) => scores[b.id] - scores[a.id]);
  const maxScore = Math.max(1, scores[sorted[0]?.id] ?? 1);

  // ── Setup screen if not yet configured ────────────────────────
  if (!configured) {
    return (
      <div style={{ minHeight: "100vh", background: "linear-gradient(160deg, #0b1628, #0f2040)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ maxWidth: 560, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 16, padding: 32 }}>
          <div style={{ color: "#fd5a1e", fontWeight: 800, fontSize: 22, marginBottom: 6 }}>⛵ McCoy Cove 2026</div>
          <div style={{ color: "#a0b4cc", fontSize: 14, marginBottom: 24 }}>One-time setup needed to enable shared voting.</div>

          <div style={{ color: "white", fontWeight: 700, fontSize: 15, marginBottom: 12 }}>Setup steps (takes ~2 minutes):</div>

          {[
            ["1", "Create a free account at", "jsonbin.io", "https://jsonbin.io"],
            ["2", "Go to API Keys and copy your", "Master Key", null],
            ["3", 'Click "Create Bin", paste in', '{"votes":[]}', null, "and click Create"],
            ["4", "Copy the Bin ID shown after creation", "", null],
            ["5", "Open this HTML file in a text editor and replace", "PASTE_YOUR_MASTER_KEY_HERE", null, "and PASTE_YOUR_BIN_ID_HERE with your values"],
            ["6", "Save and re-upload to Netlify", "", null],
          ].map(([num, text, highlight, href, suffix]) => (
            <div key={num} style={{ display: "flex", gap: 12, marginBottom: 14, alignItems: "flex-start" }}>
              <span style={{ minWidth: 24, height: 24, background: "#fd5a1e", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 800, color: "white", flexShrink: 0, marginTop: 1 }}>{num}</span>
              <span style={{ color: "#a0b4cc", fontSize: 14, lineHeight: 1.5 }}>
                {text}{" "}
                {href
                  ? <a href={href} target="_blank" style={{ color: "#fd5a1e", fontWeight: 700 }}>{highlight}</a>
                  : <code style={{ background: "rgba(253,90,30,0.15)", color: "#fd9060", padding: "1px 6px", borderRadius: 4, fontSize: 13 }}>{highlight}</code>
                }
                {suffix && " " + suffix}
              </span>
            </div>
          ))}

          <div style={{ marginTop: 20, padding: 14, background: "rgba(253,90,30,0.08)", border: "1px solid rgba(253,90,30,0.2)", borderRadius: 10, color: "#a0b4cc", fontSize: 13, lineHeight: 1.6 }}>
            JSONBin free tier allows 10,000 reads/writes per month — plenty for a crew of friends. Your data is private by default.
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(160deg, #0b1628 0%, #0f2040 55%, #1a0e05 100%)", fontFamily: "Georgia, serif", paddingBottom: 56 }}>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>

      {/* Header */}
      <div style={{ background: "linear-gradient(90deg, #0f1f3d, #1a1008)", borderBottom: "3px solid #fd5a1e", padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
        <div>
          <div style={{ color: "#fd5a1e", fontWeight: 800, fontSize: 20 }}>⛵ McCoy Cove 2026</div>
          <div style={{ color: "#a0b4cc", fontSize: 12, marginTop: 2 }}>SF Giants Day Game Planner · Oracle Park</div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {[["vote","🗳 My Vote"],["results","📊 Group Results"]].map(([tab, label]) => (
            <button key={tab} onClick={() => { setView(tab); if (tab === "results") loadFromServer(); }}
              style={{ padding: "8px 16px", borderRadius: 8, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13, fontFamily: "inherit", background: view === tab ? "#fd5a1e" : "rgba(255,255,255,0.08)", color: view === tab ? "white" : "#a0b4cc" }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* Error bar */}
      {error && (
        <div style={{ background: "#4a1010", borderBottom: "1px solid #a03030", padding: "10px 20px", color: "#ffaaaa", fontSize: 13, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          ⚠️ {error}
          <button onClick={() => setError(null)} style={{ background: "none", border: "none", color: "#ff8888", cursor: "pointer", fontSize: 16 }}>✕</button>
        </div>
      )}

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px 16px" }}>

        {/* NAME */}
        {view === "vote" && step === "name" && (
          <div style={{ maxWidth: 420, margin: "40px auto", textAlign: "center" }}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>⚾</div>
            <h2 style={{ color: "white", fontSize: 22, marginBottom: 8 }}>Who's voting?</h2>
            <p style={{ color: "#7a9abf", fontSize: 14, marginBottom: 24 }}>Rank your favorite day games for the Getaway II crew.</p>
            <input autoFocus value={voterName}
              onChange={e => setVoterName(e.target.value)}
              onKeyDown={e => e.key === "Enter" && voterName.trim() && setStep("rank")}
              placeholder="Enter your name"
              style={{ width: "100%", padding: "12px 16px", borderRadius: 10, border: "2px solid #2a4060", background: "#0f1f3d", color: "white", fontSize: 16, fontFamily: "inherit", outline: "none", marginBottom: 12, boxSizing: "border-box" }}
            />
            <button onClick={() => voterName.trim() && setStep("rank")} disabled={!voterName.trim()}
              style={{ width: "100%", padding: "12px", borderRadius: 10, border: "none", background: voterName.trim() ? "#fd5a1e" : "#333", color: "white", fontSize: 16, fontWeight: 700, fontFamily: "inherit", cursor: voterName.trim() ? "pointer" : "default" }}>
              Let's Go →
            </button>
            {loading
              ? <p style={{ color: "#3a5a7a", fontSize: 12, marginTop: 16 }}><Spinner />Loading votes…</p>
              : votes.length > 0 && (
                <p style={{ color: "#5a7a9a", fontSize: 12, marginTop: 16 }}>
                  {votes.length} crew member{votes.length !== 1 ? "s" : ""} voted: {votes.map(v => v.name).join(", ")}
                </p>
              )
            }
          </div>
        )}

        {/* RANK */}
        {view === "vote" && step === "rank" && (
          <div>
            <div style={{ marginBottom: 18 }}>
              <h2 style={{ color: "white", fontSize: 18, marginBottom: 4 }}>Hey {voterName}, rank your picks!</h2>
              <p style={{ color: "#7a9abf", fontSize: 13 }}>Click a game to add it. Drag to reorder. Rank as many or as few as you like.</p>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
              <div>
                <div style={{ color: "#fd5a1e", fontWeight: 700, fontSize: 11, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>All Games — click to add</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 540, overflowY: "auto" }}>
                  {available.map(g => <GamePill key={g.id} game={g} onClick={() => addGame(g.id)} />)}
                  {!available.length && <div style={{ color: "#5a7a9a", fontSize: 13, textAlign: "center", padding: 24 }}>All games ranked ✓</div>}
                </div>
              </div>
              <div>
                <div style={{ color: "#4adf80", fontWeight: 700, fontSize: 11, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Your Ranking — drag to reorder · click to remove</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6, minHeight: 60, maxHeight: 540, overflowY: "auto" }}>
                  {!ranking.length && (
                    <div style={{ border: "2px dashed #2a4060", borderRadius: 10, padding: 24, color: "#3a5070", fontSize: 13, textAlign: "center" }}>
                      Click games on the left to start ranking
                    </div>
                  )}
                  {ranking.map((id, i) => {
                    const g = GAMES.find(x => x.id === id);
                    return (
                      <GamePill key={id} game={g} rank={i + 1} draggable
                        onDragStart={handleDragStart(i)} onDragOver={handleDragOver(i)}
                        onDrop={handleDrop(i)} onDragEnd={() => { dragItem.current = null; }}
                        onClick={() => removeGame(id)}
                      />
                    );
                  })}
                </div>
                {ranking.length > 0 && (
                  <button onClick={handleSubmit} disabled={saving}
                    style={{ marginTop: 12, width: "100%", padding: "12px", borderRadius: 10, border: "none", background: saving ? "#444" : "#fd5a1e", color: "white", fontSize: 15, fontWeight: 700, fontFamily: "inherit", cursor: saving ? "default" : "pointer" }}>
                    {saving ? <><Spinner />Saving…</> : `Submit My ${ranking.length} Pick${ranking.length !== 1 ? "s" : ""} →`}
                  </button>
                )}
              </div>
            </div>
          </div>
        )}

        {/* DONE */}
        {view === "vote" && step === "done" && doneSnap && (
          <div style={{ maxWidth: 500, margin: "40px auto", textAlign: "center" }}>
            <div style={{ fontSize: 56, marginBottom: 12 }}>⚓</div>
            <h2 style={{ color: "white", fontSize: 22, marginBottom: 8 }}>Vote saved!</h2>
            {doneSnap.topGame && (
              <p style={{ color: "#7a9abf", fontSize: 14, marginBottom: 8 }}>
                Thanks {voterName}. Your top pick: <strong style={{ color: "#fd5a1e" }}>{doneSnap.topGame.opponent} — {doneSnap.topGame.date}</strong>
              </p>
            )}
            <p style={{ color: "#5a7a9a", fontSize: 13, marginBottom: 24 }}>
              {doneSnap.totalVoters} crew member{doneSnap.totalVoters !== 1 ? "s" : ""} have voted so far.
            </p>
            <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
              <button onClick={() => { setStep("name"); setVoterName(""); setRanking([]); }}
                style={{ padding: "10px 20px", borderRadius: 8, border: "1.5px solid #2a4060", background: "transparent", color: "#a0b4cc", fontFamily: "inherit", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
                Vote Again
              </button>
              <button onClick={() => { setView("results"); loadFromServer(); }}
                style={{ padding: "10px 20px", borderRadius: 8, border: "none", background: "#fd5a1e", color: "white", fontFamily: "inherit", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                See Results →
              </button>
            </div>
          </div>
        )}

        {/* RESULTS */}
        {view === "results" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 20, flexWrap: "wrap", gap: 10 }}>
              <div>
                <h2 style={{ color: "white", fontSize: 20 }}>Group Rankings</h2>
                <p style={{ color: "#7a9abf", fontSize: 13, marginTop: 3 }}>
                  Borda count · {votes.length} voter{votes.length !== 1 ? "s" : ""}
                  {votes.length > 0 && ": " + votes.map(v => v.name).join(", ")}
                </p>
              </div>
              <button onClick={loadFromServer}
                style={{ padding: "8px 14px", borderRadius: 8, border: "1.5px solid #2a4060", background: "transparent", color: "#a0b4cc", fontSize: 12, fontFamily: "inherit", cursor: "pointer", fontWeight: 600 }}>
                {loading ? <><Spinner />Refreshing…</> : "↻ Refresh"}
              </button>
            </div>
            {loading && <div style={{ color: "#5a7a9a", textAlign: "center", padding: 40 }}><Spinner />Loading…</div>}
            {!loading && !votes.length && (
              <div style={{ color: "#5a7a9a", textAlign: "center", padding: 40, fontSize: 15 }}>No votes yet — be the first to rank!</div>
            )}
            {!loading && votes.length > 0 && (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {sorted.map((g, i) => {
                  const sc   = scores[g.id];
                  const pct  = (sc / maxScore) * 100;
                  const medal = ["🥇","🥈","🥉"][i] ?? null;
                  return (
                    <div key={g.id} style={{ background: i < 3 ? "rgba(253,90,30,.08)" : "rgba(255,255,255,.04)", border: i < 3 ? "1px solid rgba(253,90,30,.25)" : "1px solid rgba(255,255,255,.06)", borderRadius: 10, padding: "10px 14px", display: "flex", alignItems: "center", gap: 12 }}>
                      <span style={{ fontSize: 18, width: 28, textAlign: "center", flexShrink: 0 }}>
                        {medal ?? <span style={{ color: "#3a5070", fontSize: 13, fontWeight: 700 }}>#{i+1}</span>}
                      </span>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
                          <MonthTag month={g.month} />
                          <span style={{ color: "#a0b4cc", fontSize: 11 }}>{g.date}</span>
                          <span style={{ color: "#6a8aaa", fontSize: 11 }}>{g.time}</span>
                        </div>
                        <div style={{ fontWeight: 700, fontSize: 14, color: "white" }}>vs. {g.opponent}</div>
                        <div style={{ marginTop: 5, height: 5, background: "#1a3050", borderRadius: 3, overflow: "hidden" }}>
                          <div style={{ height: "100%", width: pct + "%", borderRadius: 3, background: i === 0 ? "#fd5a1e" : i < 3 ? "#f0a060" : "#3a6090", transition: "width .6s ease" }} />
                        </div>
                      </div>
                      <div style={{ textAlign: "right", flexShrink: 0 }}>
                        <div style={{ color: i < 3 ? "#fd5a1e" : "#a0b4cc", fontWeight: 800, fontSize: 18 }}>{sc}</div>
                        <div style={{ color: "#4a6a8a", fontSize: 10 }}>{counts[g.id] || 0} vote{counts[g.id] !== 1 ? "s" : ""}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
